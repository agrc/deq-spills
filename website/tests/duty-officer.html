<html>
  <head>
    <title>Duty Officer Embed Test</title>
    <link rel="stylesheet" href="../src/index.css" />
  </head>

  <script>
    const MESSAGE_TYPES = {
      DATA_SYNC: 'data-sync',
      FLOWPATH_TOKEN_REQUEST: 'flowpath-token-request',
      FLOWPATH_TOKEN_RESPONSE: 'flowpath-token-response',
    };

    window.addEventListener('iframe-is-listening', () => {
      console.log('window loaded');
      const iframe = document.querySelector('iframe');

      iframe.contentWindow.postMessage(
        {
          data: {
            ID: 'a0123456789ABCDE', // test spill record Id
            UTM_X: 420304,
            UTM_Y: 4511432,
          },
          iframeId: '1234',
          type: MESSAGE_TYPES.DATA_SYNC,
        },
        'http://localhost:5173',
      );
    });

    window.addEventListener('message', (event) => {
      if (!event.data.iframeId) {
        return;
      }

      if (event.data.type === MESSAGE_TYPES.FLOWPATH_TOKEN_REQUEST) {
        document.querySelector('iframe').contentWindow.postMessage(
          {
            iframeId: event.data.iframeId,
            requestId: event.data.requestId,
            token: 'local-test-token', // corresponds with value in website/functions/.env
            type: MESSAGE_TYPES.FLOWPATH_TOKEN_RESPONSE,
          },
          'http://localhost:5173',
        );
      }

      console.log('salesforce: event from iframe', JSON.stringify(event.data, null, 2));
    });
  </script>

  <body class="bg-cyan-200">
    <div class="h-[2000px] w-full bg-white p-4 md:w-1/2 lg:w-3/4">
      <div class="h-[700px]">
        <p class="h-40">A bunch of form content</p>
        <iframe
          src="./?embedded=true&flowpath=true"
          style="border-color: rgb(201, 201, 201); border-width: 1px; border-style: solid"
          width="100%"
          height="100%"
          frameborder="0"
          scrolling="no"
        ></iframe>
        <p class="h-40">A bunch of form content</p>
      </div>
    </div>
  </body>
</html>
